name: 기능 요청
description: 새로운 기능이나 개선 사항을 제안해 주세요.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        기능 요청을 작성해 주셔서 감사합니다. 구체적인 내용을 작성해 주시면 검토에 도움이 됩니다.

  - type: dropdown
    id: type
    attributes:
      label: 요청 유형
      options:
        - 신규 기능
        - 기존 기능 개선
        - UI/UX 개선
        - 성능 개선
        - 접근성 개선
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 해결하고자 하는 문제
      description: 이 기능이 필요한 이유나 현재 불편한 점을 설명해 주세요.
      placeholder: 예) 제품 상세 페이지에서 유사 제품을 바로 확인할 수 없어 사용자가 목록으로 다시 돌아가야 합니다.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결책
      description: 어떻게 구현되었으면 하는지 설명해 주세요.
      placeholder: 예) 제품 상세 페이지 하단에 같은 카테고리의 관련 제품 4개를 카드 형태로 노출합니다.
    validations:
      required: true

  - type: dropdown
    id: fsd-layer
    attributes:
      label: 관련 FSD 레이어 (개발자용)
      description: 구현이 필요한 레이어를 선택해 주세요.
      multiple: true
      options:
        - app (라우팅/페이지)
        - widgets (페이지 섹션)
        - features (비즈니스 기능)
        - entities (도메인 모델)
        - shared (공통 컴포넌트/유틸리티)

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위 (주관적 판단)
      options:
        - 높음 — 핵심 기능, 즉시 필요
        - 보통 — 있으면 좋음
        - 낮음 — 장기적으로 고려
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      description: 다른 방법도 검토했다면 작성해 주세요.

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 참고할 만한 레퍼런스 사이트, 스크린샷, 디자인 시안 등을 첨부해 주세요.
