name: 작업 (Task)
description: 개발 작업, 리팩토링, 의존성 업데이트 등 일반 태스크를 등록합니다.
title: "[Task] "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        개발 태스크를 등록합니다. 완료 기준(Definition of Done)을 명확히 작성해 주세요.

  - type: dropdown
    id: type
    attributes:
      label: 작업 유형
      options:
        - 컴포넌트 구현
        - 페이지 구현
        - 리팩토링
        - 의존성 업데이트
        - 테스트 작성
        - 문서 작성
        - CI/CD 설정
        - SEO/성능 최적화
        - 이미지 최적화
    validations:
      required: true

  - type: dropdown
    id: fsd-layer
    attributes:
      label: FSD 레이어
      description: 작업이 속하는 레이어를 선택해 주세요.
      multiple: true
      options:
        - app
        - widgets
        - features
        - entities
        - shared
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 작업 내용
      description: 무엇을 구현/수정해야 하는지 구체적으로 작성해 주세요.
      placeholder: |
        예)
        - `src/widgets/hero-section/ui/HeroSection.tsx` 구현
        - 배경 이미지에 next/image 적용 (priority, sizes 설정 포함)
        - CTA 버튼 클릭 시 /contact 페이지로 이동
    validations:
      required: true

  - type: textarea
    id: dod
    attributes:
      label: 완료 기준 (Definition of Done)
      description: 작업이 완료되었다고 판단하는 기준을 체크리스트로 작성해 주세요.
      placeholder: |
        - [ ] 컴포넌트 RSC로 구현
        - [ ] 모바일/태블릿/데스크톱 반응형 확인
        - [ ] pnpm build 에러 없음
        - [ ] Lighthouse 성능 점수 유지
      value: |
        - [ ] pnpm build 에러 없음
        - [ ] TypeScript 타입 에러 없음
        - [ ] 모바일 반응형 확인
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 관련 이슈, PR, 디자인 시안, 참고 URL 등을 작성해 주세요.
